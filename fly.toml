# fly.toml app configuration file generated for ypatel-draft-api on 2026-02-21T13:25:12-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ypatel-draft-api'
primary_region = 'iad'

[build]
  dockerfile = 'draft_api/Dockerfile'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[mounts]]
  source = 'draft_data'
  destination = '/data'
