<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ansatz.ai</title>
  <meta name="description" content="Accelerating the future of engineering design.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --fg: #ffffff;
      --accent: #00b4d8;
      --accent-dark: #0077b6;
      --dim: #3a4a5b;
      --faint: #1a2332;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Space Grotesk', 'Helvetica Neue', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }

    /* Staggered fade-in */
    .fade-in {
      opacity: 0;
      transform: translateY(12px);
      animation: reveal 1s ease forwards;
    }

    .fade-in:nth-child(1) { animation-delay: 0.3s; }
    .fade-in:nth-child(2) { animation-delay: 0.7s; }
    .fade-in:nth-child(3) { animation-delay: 1.1s; }
    .fade-in:nth-child(4) { animation-delay: 1.5s; }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(2.8rem, 8vw, 4.5rem);
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(160deg, #ffffff 40%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 28px auto;
    }

    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      color: var(--dim);
      letter-spacing: 0.06em;
      line-height: 1.7;
    }

    .links {
      margin-top: 40px;
    }

    .deck-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--fg);
      text-decoration: none;
      letter-spacing: 0.06em;
      padding: 10px 28px;
      border: 1px solid rgba(0, 180, 216, 0.3);
      border-radius: 4px;
      transition: all 0.3s ease;
      background: rgba(0, 180, 216, 0.04);
    }

    .deck-link:hover {
      border-color: var(--accent);
      background: rgba(0, 180, 216, 0.1);
      box-shadow: 0 0 20px rgba(0, 180, 216, 0.1);
    }

    .contact {
      margin-top: 32px;
    }

    .contact a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.04em;
      opacity: 0.6;
      transition: opacity 0.3s ease;
    }

    .contact a:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <canvas id="field"></canvas>

  <div class="page">
    <div class="fade-in">
      <h1 class="title">ansatz.ai</h1>
    </div>

    <div class="fade-in">
      <div class="divider"></div>
    </div>

    <div class="fade-in">
      <p class="tagline">
        Accelerating the future<br>of engineering design.
      </p>
    </div>

    <div class="fade-in">
      <div class="links">
        <a href="slides.html" class="deck-link">View Deck ↗</a>
      </div>
      <div class="contact">
        <a href="mailto:ypatel5400@gmail.com">ypatel5400@gmail.com</a>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('field');
    const ctx = canvas.getContext('2d');
    let w, h, particles;

    const CONFIG = {
      count: 60,
      speed: 0.15,
      maxDist: 120,
      lineAlpha: 0.07,
      dotRadius: 1.2,
      dotAlpha: 0.25,
      color: [0, 180, 216],
    };

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      w = canvas.width = window.innerWidth * dpr;
      h = canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(dpr, dpr);
    }

    function init() {
      resize();
      const iw = window.innerWidth;
      const ih = window.innerHeight;
      particles = Array.from({ length: CONFIG.count }, () => ({
        x: Math.random() * iw,
        y: Math.random() * ih,
        vx: (Math.random() - 0.5) * CONFIG.speed,
        vy: (Math.random() - 0.5) * CONFIG.speed,
      }));
    }

    function draw() {
      const iw = window.innerWidth;
      const ih = window.innerHeight;
      ctx.clearRect(0, 0, iw, ih);
      const [r, g, b] = CONFIG.color;

      for (let i = 0; i < particles.length; i++) {
        const a = particles[i];
        a.x += a.vx;
        a.y += a.vy;
        if (a.x < 0 || a.x > iw) a.vx *= -1;
        if (a.y < 0 || a.y > ih) a.vy *= -1;

        ctx.beginPath();
        ctx.arc(a.x, a.y, CONFIG.dotRadius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${CONFIG.dotAlpha})`;
        ctx.fill();

        for (let j = i + 1; j < particles.length; j++) {
          const p = particles[j];
          const dx = a.x - p.x;
          const dy = a.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONFIG.maxDist) {
            const alpha = CONFIG.lineAlpha * (1 - dist / CONFIG.maxDist);
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    init();
    draw();
  </script>
</body>
</html>
